services:

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile  # Use development Dockerfile
    container_name: alms-backend-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development  # Development mode
      PORT: 3000
    ports:
      - "3000:3000"  # Expose for standalone development
    volumes:
      - ./backend/src:/app/src  # Hot reload for development
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - alms-dev-net

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev  # Use development Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
    container_name: alms-frontend-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NODE_ENV: development  # Development mode
      PORT: 5000
    ports:
      - "5000:5000"  # Expose for standalone development
    volumes:
      - ./frontend/src:/app/src  # Hot reload for development
      - ./frontend/pages:/app/pages
    depends_on:
      backend-dev:
        condition: service_healthy
    networks:
      - alms-dev-net

networks:
  alms-dev-net:
    driver: bridge
    
# NOTE: This compose file is now for standalone development only.
# For unified dev+prod setup with single Nginx, use:
# docker-compose -f docker-compose.unified.yml up