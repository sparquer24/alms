services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile  # Use development Dockerfile
    container_name: alms-backend-dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development  # Development mode
      PORT: 3000
    ports:
      - "3000:3000"  # Expose for development
    volumes:
      - ./backend/src:/app/src  # Hot reload for development
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - alms-dev-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev  # Use development Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
    container_name: alms-frontend-dev
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NODE_ENV: development  # Development mode
      PORT: 5000
    ports:
      - "5000:5000"  # Expose for development
    volumes:
      - ./frontend/src:/app/src  # Hot reload for development
      - ./frontend/pages:/app/pages
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alms-dev-net

  nginx:
    image: nginx:stable-alpine
    container_name: alms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/dev.alms.sparquer.com-0001/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/dev.alms.sparquer.com-0001/privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - alms-dev-net

networks:
  alms-dev-net:
    driver: bridge