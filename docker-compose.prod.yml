services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: alms-backend-prod
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}   # must point to AWS RDS
      NODE_ENV: production
      PORT: 3001  # Production backend port (different from dev)
    # REMOVED: ports exposure - nginx handles all external traffic
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - alms-prod-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: alms-frontend-prod
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: production
      PORT: 5001  # Production frontend port (different from dev)
    # No ports exposed - nginx handles routing
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alms-prod-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  nginx:
    image: nginx:stable-alpine
    container_name: alms-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # IMPORTANT: Map the new production certificates here
      - /etc/letsencrypt/live/alms.sparquer.com/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/alms.sparquer.com/privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - alms-prod-net

networks:
  alms-prod-net:
    driver: bridge
