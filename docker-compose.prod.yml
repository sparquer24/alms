services:

  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod  # Production Dockerfile
    container_name: alms-backend-prod
    restart: unless-stopped
    env_file:
      - ./.env.prod  # Production environment file
    environment:
      DATABASE_URL: ${DATABASE_URL}   # Production AWS RDS
      NODE_ENV: production
      PORT: 3001  # Different port from dev
    # NO port exposure - nginx handles all traffic
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=3", "--spider", "http://localhost:3001/api/health/ready"]
      interval: 45s
      timeout: 15s
      retries: 5  
      start_period: 120s
    networks:
      - alms-prod-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod  # Production Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}  # Production API URL
    container_name: alms-frontend-prod
    restart: unless-stopped
    env_file:
      - ./.env.prod  # Production environment file
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: production
      PORT: 5001  # Different port from dev
    # NO port exposure - nginx handles all traffic
    depends_on:
      backend-prod:
        condition: service_healthy
    networks:
      - alms-prod-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  nginx-prod:
    image: nginx:stable-alpine
    container_name: alms-nginx-prod
    restart: unless-stopped
    ports:
      - "8080:80"   # Production HTTP on different port  
      - "8443:443"  # Production HTTPS on different port
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates (using VALID dev certificate):
      - /etc/letsencrypt/live/dev.alms.sparquer.com-0001/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/dev.alms.sparquer.com-0001/privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      backend-prod:
        condition: service_healthy
      frontend-prod:
        condition: service_started
    networks:
      - alms-prod-net

networks:
  alms-prod-net:
    driver: bridge
