user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048; # Increased for prod
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    
    server_tokens off; # Security: Hide nginx version

    # ─── PERFORMANCE: Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml;

    # Brotli compression (if available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ─── PERFORMANCE: Caching ────────────────────────────────────────────────────
    # Cache static assets aggressively
    map $sent_http_content_type $expires {
        "text/html"                 1h;
        "text/css"                  1M;
        "application/javascript"    1M;
        "~image/"                   1M;
        "~font/"                    1M;
        default                     off;
    }
    expires $expires;

    # ─── Rate Limiting ───────────────────────────────────────────────────────────
    # General rate limit: 20 requests/sec per IP (bursts up to 40)
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    # Stricter limit for API: 10 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ─── Bad Bot Blocking ────────────────────────────────────────────────────────
    map $http_user_agent $bad_bot {
        default         0;
        "~*zgrab"       1;
        "~*Assetnote"   1;
        "~*masscan"     1;
        "~*nikto"       1;
        "~*nmap"        1;
        "~*sqlmap"      1;
        "~*python-requests" 1;
        "~*Go-http-client/1" 1;
        ""              1;   # block empty user agents
    }

    # ─── Logging ─────────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    upstream backend-prod {
        server alms-backend-prod:3001;
    }

    upstream frontend-prod {
        server alms-frontend-prod:5001;
    }

    # ─── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name alms.sparquer.com;
        return 301 https://$host$request_uri;
    }

    # ─── Drop requests with unknown/bare IP (no domain) ──────────────────────────
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        return 444;  # close connection silently
    }

    # ─── Main HTTPS Server ───────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name alms.sparquer.com;

        # SSL Certificates from Let's Encrypt (to be mounted by docker-compose)
        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        # SSL hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d; # Extended for prod
        ssl_session_tickets off;

        # Diffie-Hellman parameter for DHE ciphersuites (optional but recommended)
        # ssl_dhparam /etc/nginx/dhparam.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

        # Block bad bots immediately
        if ($bad_bot) {
            return 403;
        }

        # Block common scanner probe paths
        location ~* ^/(owa|autodiscover|.env|wp-admin|wp-login|phpmyadmin|cgi-bin|shell|config) {
            return 403;
        }

        # Static file optimization
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Proxy API requests to backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend-prod$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
            proxy_read_timeout 90;
            
            # API response compression
            gzip_proxied any;
        }

        # Websocket endpoints
        location /ws/ {
            proxy_pass http://backend-prod$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other traffic goes to Next.js frontend
        location / {
            limit_req zone=general burst=40 nodelay;

            proxy_pass http://frontend-prod$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
        }
    }
}
