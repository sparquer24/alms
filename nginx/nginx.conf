user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # ─── Rate Limiting ───────────────────────────────────────────────────────────
    # General rate limit: 10 requests/sec per IP (bursts up to 20)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # Stricter limit for API: 5 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    # ─── Bad Bot Blocking ────────────────────────────────────────────────────────
    map $http_user_agent $bad_bot {
        default         0;
        "~*zgrab"       1;
        "~*Assetnote"   1;
        "~*masscan"     1;
        "~*nikto"       1;
        "~*nmap"        1;
        "~*sqlmap"      1;
        "~*python-requests" 1;
        "~*Go-http-client/1" 1;
        ""              1;   # block empty user agents
    }

    # ─── Logging ─────────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    upstream backend {
        server backend:3000;
    }

    upstream frontend {
        server frontend:5000;
    }

    # ─── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name dev.alms.sparquer.com 13.201.133.214;
        return 301 https://$host$request_uri;
    }

    # ─── Drop requests with unknown/bare IP (no domain) ──────────────────────────
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        return 444;  # close connection silently
    }

    # ─── Main HTTPS Server ───────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name dev.alms.sparquer.com;

        # SSL Certificates from Let's Encrypt
        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        # SSL hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Block bad bots immediately
        if ($bad_bot) {
            return 403;
        }

        # Block common scanner probe paths
        location ~* ^/(owa|autodiscover|.env|wp-admin|wp-login|phpmyadmin|cgi-bin|shell|config) {
            return 403;
        }

        # Proxy API requests to backend
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
            proxy_read_timeout 90;
        }

        # Websocket endpoints
        location /ws/ {
            proxy_pass http://backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other traffic goes to Next.js frontend
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://frontend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
        }
    }
}