user  www-data;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    server_tokens off; # Security: Hide nginx version

    # ─── PERFORMANCE: Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml;

    # ─── PERFORMANCE: Caching ────────────────────────────────────────────────────
    map $sent_http_content_type $expires {
        "text/html"                 1h;
        "text/css"                  1M;
        "application/javascript"    1M;
        "~image/"                   1M;
        "~font/"                    1M;
        default                     off;
    }
    expires $expires;

    # ─── Rate Limiting ───────────────────────────────────────────────────────────
    # Development: More lenient limits for testing
    limit_req_zone $binary_remote_addr zone=dev-general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=dev-api:10m rate=15r/s;
    
    # Production: Stricter limits
    limit_req_zone $binary_remote_addr zone=prod-general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=prod-api:10m rate=5r/s;

    # ─── Bad Bot Blocking ────────────────────────────────────────────────────────
    map $http_user_agent $bad_bot {
        default         0;
        "~*zgrab"       1;
        "~*Assetnote"   1;
        "~*masscan"     1;
        "~*nikto"       1;
        "~*nmap"        1;
        "~*sqlmap"      1;
        "~*python-requests" 1;
        "~*Go-http-client/1" 1;
        ""              1;   # block empty user agents
    }

    # ─── Logging ─────────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'upstream="$upstream_addr" host="$host"';
    access_log  /var/log/nginx/access.log  main;

    # ─── UPSTREAM DEFINITIONS ────────────────────────────────────────────────────
    # Development Environment Services
    upstream backend-dev {
        server localhost:3000;
        keepalive 32;
    }

    upstream frontend-dev {
        server localhost:5000;
        keepalive 32;
    }

    # Production Environment Services
    upstream backend-prod {
        server backend-prod:3001;
        keepalive 32;
    }

    upstream frontend-prod {
        server frontend-prod:5001;
        keepalive 32;
    }

    # ─── HTTP → HTTPS Redirect for Both Domains ──────────────────────────────────
    server {
        listen 80;
        server_name dev.alms.sparquer.com alms.sparquer.com;
        return 301 https://$host$request_uri;
    }

    # ─── Drop requests with unknown/bare IP (no domain) ──────────────────────────
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        return 444;  # close connection silently
    }

    # ─── DEVELOPMENT ENVIRONMENT SERVER ──────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name dev.alms.sparquer.com;

        # SSL Certificates (Let's Encrypt)
        ssl_certificate /etc/ssl/certs/dev-fullchain.pem;
        ssl_certificate_key /etc/ssl/private/dev-privkey.pem;

        # SSL Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Environment "development" always;

        # Block bad bots
        if ($bad_bot) {
            return 403;
        }

        # Block common scanner paths
        location ~* ^/(owa|autodiscover|\.env|wp-admin|wp-login|phpmyadmin|cgi-bin|shell|config) {
            return 403;
        }

        # Development API routes with lenient rate limiting
        location /api/ {
            limit_req zone=dev-api burst=30 nodelay;

            proxy_pass http://backend-dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
            proxy_read_timeout 90;
            proxy_connect_timeout 10;
            proxy_send_timeout 90;
        }

        # Development WebSocket support
        location /ws/ {
            proxy_pass http://backend-dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600; # Extended for WebSocket
            proxy_send_timeout 3600;
        }

        # Development Frontend (all other routes)
        location / {
            limit_req zone=dev-general burst=50 nodelay;

            proxy_pass http://frontend-dev;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
            proxy_connect_timeout 10;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
        }
    }

    # ─── PRODUCTION ENVIRONMENT SERVER ───────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name alms.sparquer.com;

        # SSL Certificates (Let's Encrypt)
        ssl_certificate /etc/ssl/certs/prod-fullchain.pem;
        ssl_certificate_key /etc/ssl/private/prod-privkey.pem;

        # Enhanced SSL Configuration for Production
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Enhanced Security headers for Production
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Environment "production" always;

        # Block bad bots
        if ($bad_bot) {
            return 403;
        }

        # Block common scanner paths
        location ~* ^/(owa|autodiscover|\.env|wp-admin|wp-login|phpmyadmin|cgi-bin|shell|config) {
            return 403;
        }

        # Production API routes with strict rate limiting
        location /api/ {
            limit_req zone=prod-api burst=10 nodelay;

            proxy_pass http://backend-prod;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
            proxy_read_timeout 60; # Stricter timeouts for prod
            proxy_connect_timeout 5;
            proxy_send_timeout 60;
        }

        # Production WebSocket support
        location /ws/ {
            proxy_pass http://backend-prod;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
        }

        # Production Frontend (all other routes)
        location / {
            limit_req zone=prod-general burst=20 nodelay;

            proxy_pass http://frontend-prod;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
            proxy_connect_timeout 5;
            proxy_send_timeout 60;
            proxy_read_timeout 60;
        }
    }
}