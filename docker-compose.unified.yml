version: '3.8'

services:
  # ─── DEVELOPMENT SERVICES ────────────────────────────────────────────────────
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alms-backend-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"  # Expose for system nginx access
    volumes:
      - ./backend/src:/app/src  # Hot reload for development
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - alms-unified-net

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_API_URL: https://dev.alms.sparquer.com/api
    container_name: alms-frontend-dev
    restart: unless-stopped
    env_file:
      - ./.env.dev
    environment:
      NEXT_PUBLIC_API_URL: https://dev.alms.sparquer.com/api
      NODE_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"  # Expose for system nginx access
    volumes:
      - ./frontend/src:/app/src  # Hot reload for development
      - ./frontend/pages:/app/pages
    depends_on:
      backend-dev:
        condition: service_healthy
    networks:
      - alms-unified-net

  # ─── PRODUCTION SERVICES ─────────────────────────────────────────────────────
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: alms-backend-prod
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"  # Expose for system nginx access
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=3", "--spider", "https://alms.sparquer.com/api/health"]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - alms-unified-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://alms.sparquer.com/api}
        NEXT_PUBLIC_PORT: ${NEXT_PUBLIC_PORT:-5001}
        NODE_ENV: production
    container_name: alms-frontend-prod
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://alms.sparquer.com/api}
      NEXT_PUBLIC_PORT: ${NEXT_PUBLIC_PORT:-5001}
      NODE_ENV: production
      PORT: 5001
    ports:
      - "5001:5001"  # Expose for system nginx access
    depends_on:
      backend-prod:
        condition: service_healthy
    networks:
      - alms-unified-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=3", "--spider", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
# ─── UNIFIED NETWORK ──────────────────────────────────────────────────────────
networks:
  alms-unified-net:
    name: alms-unified-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16